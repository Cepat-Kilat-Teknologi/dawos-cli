site_name: dawos-cli
site_url: https://Cepat-Kilat-Teknologi.github.io/dawos-cli
site_description: Remote CLI client for dawos-agent — manage PPPoE/BNG routers from the command line
site_author: Cepat Kilat Teknologi

repo_name: Cepat-Kilat-Teknologi/dawos-cli
repo_url: https://github.com/Cepat-Kilat-Teknologi/dawos-cli
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
  - Commands:
      - Overview: commands/index.md
      - Session Management: commands/session.md
      - System & Service: commands/system.md
      - Network & Routing: commands/network.md
      - Firewall & NAT: commands/firewall.md
      - Traffic & Monitoring: commands/traffic.md
      - All Commands: commands/reference.md
  - Testing:
      - CLI Test Report: testing/test-report.md
  - Guides:
      - Multi-Node Management: guides/multi-node.md
      - Scripting & Automation: guides/scripting.md
      - Troubleshooting: guides/troubleshooting.md
  - Development:
      - Contributing: development/contributing.md
      - Architecture: development/architecture.md
      - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Cepat-Kilat-Teknologi/dawos-cli
